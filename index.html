<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Language Vibes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0f18;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:24px 16px}
  h1{text-align:center;font-size:1.4rem;letter-spacing:2px;color:#fff;margin-bottom:6px;text-transform:uppercase}
  .sub{text-align:center;font-size:0.72rem;color:#444;margin-bottom:22px;letter-spacing:1px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
  .search-box{background:#151720;border:1px solid #252838;color:#e0e0e0;padding:7px 14px;border-radius:8px;font-size:12px;width:220px;outline:none}
  .search-box:focus{border-color:#4a9eff}
  .cat-btn{background:#151720;border:1px solid #252838;color:#555;padding:4px 12px;border-radius:20px;font-size:10.5px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .cat-btn.active{border-color:var(--c);color:var(--c)}
  .clear-btn{background:#151720;border:1px solid #e05050;color:#e05050;padding:4px 11px;border-radius:20px;font-size:10.5px;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1400px;margin:0 auto}
  .card{background:#111420;border:1px solid #1e2133;border-radius:10px;padding:16px 18px;transition:transform .15s,border-color .15s;cursor:default;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-2px);border-color:var(--cc)}
  .card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--cc);border-radius:2px 0 0 2px}
  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .lang-name{font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.5px}
  .cat-tag{font-size:9.5px;padding:2px 8px;border-radius:10px;border:1px solid var(--cc);color:var(--cc);margin-left:auto;white-space:nowrap}
  .emoji{font-size:1.3rem}
  .vibe-line{font-size:12.5px;color:#9ca3b0;line-height:1.7;font-style:italic;border-left:2px solid #1e2133;padding-left:10px;margin-bottom:8px}
  .vibe-line span{color:#fff;font-style:normal;font-weight:600}
  .aura{font-size:11px;color:#555;line-height:1.5;margin-top:6px}
  .hidden{display:none!important}
  .count{text-align:center;font-size:11px;color:#333;margin-bottom:14px}
</style>
</head>
<body>
<h1>Every Language's Vibe</h1>
<p class="sub">112 languages · honest aura · real personality</p>

<div class="controls">
  <input class="search-box" id="si" placeholder="🔍 Search language..." oninput="filter()"/>
  <button class="cat-btn active" style="--c:#4a9eff"  data-cat="systems"    onclick="tog(this)">⚙ Systems</button>
  <button class="cat-btn active" style="--c:#f6c90e"  data-cat="web"        onclick="tog(this)">🌐 Web</button>
  <button class="cat-btn active" style="--c:#4fd1c5"  data-cat="general"    onclick="tog(this)">🔷 General</button>
  <button class="cat-btn active" style="--c:#f4a460"  data-cat="enterprise" onclick="tog(this)">🏢 Enterprise</button>
  <button class="cat-btn active" style="--c:#b794f4"  data-cat="functional" onclick="tog(this)">λ Functional</button>
  <button class="cat-btn active" style="--c:#fc8181"  data-cat="domain"     onclick="tog(this)">🔬 Domain</button>
  <button class="cat-btn active" style="--c:#68d391"  data-cat="scripting"  onclick="tog(this)">📜 Scripting</button>
  <button class="cat-btn active" style="--c:#f9a8d4"  data-cat="legacy"     onclick="tog(this)">🏛 Legacy</button>
  <button class="cat-btn active" style="--c:#fbbf24"  data-cat="emerging"   onclick="tog(this)">🚀 Emerging</button>
  <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
  <button class="cat-btn" style="--c:#aaa;border-color:#444;color:#444" onclick="selAll()">✓ All</button>
</div>
<div class="count" id="cnt"></div>
<div class="grid" id="grid"></div>

<script>
const CAT = {
  systems:   {color:'#4a9eff', label:'Systems'},
  web:       {color:'#f6c90e', label:'Web'},
  general:   {color:'#4fd1c5', label:'General'},
  enterprise:{color:'#f4a460', label:'Enterprise'},
  functional:{color:'#b794f4', label:'Functional'},
  domain:    {color:'#fc8181', label:'Domain'},
  scripting: {color:'#68d391', label:'Scripting'},
  legacy:    {color:'#f9a8d4', label:'Legacy'},
  emerging:  {color:'#fbbf24', label:'Emerging'},
};

const LANGS = [
  // ── SYSTEMS ──
  {name:'C', cat:'systems', emoji:'🦴',
   vibe:`<span>I am the skeleton of computers.</span> Everything runs on me, even if nobody admits it. Your OS, your browser, your AI chips — all built on my bones. I don't hold your hand. I don't give you garbage collection. I trust you completely. That's why I'm dangerous.`,
   aura:'Raw power. Zero comfort. The language that built the modern world and never asked for credit.'},

  {name:'C++', cat:'systems', emoji:'⚔️',
   vibe:`<span>I can do everything. And I will make you pay for it.</span> Games, browsers, trading engines, AI inference — I'm there. I give you control no other language dares to. But I also give you 47 ways to shoot yourself in the foot. Pick your weapon.`,
   aura:'A Swiss Army knife that occasionally stabs the user. Respected everywhere, loved by masochists.'},

  {name:'Rust', cat:'systems', emoji:'🛡️',
   vibe:`<span>I refuse to let your program crash.</span> The borrow checker is not your enemy — it's the only honest friend you've ever had. Every other language lets you make mistakes. I make you understand them first. Painful upfront. Invincible after.`,
   aura:'The overachieving perfectionist. Developers admire Rust more than any other language. For good reason.'},

  {name:'Assembly', cat:'systems', emoji:'🔩',
   vibe:`<span>I speak to the machine directly.</span> No layers. No abstractions. No mercy. When you write me, you are the compiler. You are the OS. You are everything. Most programmers will never truly know me. That's fine. I was here before them. I'll be here after.`,
   aura:'The ancient god. Rarely seen, always underneath. The language of pure metal.'},

  {name:'Zig', cat:'systems', emoji:'⚡',
   vibe:`<span>C is old. Rust is complicated. I am neither.</span> I do what C does but without the undefined behavior landmines. No hidden control flow. No macros that lie to you. Comptime is my superpower. I'm not here to replace Rust — I'm here to replace C, honestly.`,
   aura:'The straightforward new kid challenging decades of legacy. Growing fast, no ego.'},

  {name:'Ada', cat:'systems', emoji:'✈️',
   vibe:`<span>If your code crashes, people die.</span> I'm the language of aerospace, defense, and medical devices. I was designed for correctness, not convenience. NASA doesn't use me because I'm trendy. They use me because I don't make mistakes. Neither should you.`,
   aura:'The silent guardian. Unglamorous, unbreakable. Flies aircraft and runs nuclear plants.'},

  {name:'Fortran', cat:'systems', emoji:'🔭',
   vibe:`<span>I invented scientific computing.</span> COBOL handles money, I handle physics. Climate simulations, quantum chemistry, weather forecasting — the world's hardest math runs on me. I'm 68 years old and still faster than Python at what I do. Think about that.`,
   aura:'The immortal scientist. Ancient, powerful, irreplaceable. The language NASA still trusts.'},

  {name:'D', cat:'systems', emoji:'🌓',
   vibe:`<span>I tried to be the better C++.</span> Garbage collection optional. Powerful templates. Modern syntax. I did everything right. The industry just... didn't show up. I'm the best language you've never used. That's not my fault. That's just how tech works sometimes.`,
   aura:'The underdog that deserved better. Technically excellent, commercially unlucky.'},

  {name:'Nim', cat:'systems', emoji:'🔮',
   vibe:`<span>I have Python's elegance and C's speed.</span> I compile to C, JS, or native. My metaprogramming will make your head spin in the best way. I'm the hidden gem that systems programmers whisper about. Small community, massive capability. Discovery pending.`,
   aura:'The quiet polymath. Elegant, fast, and criminally underrated.'},

  {name:'V', cat:'systems', emoji:'🌿',
   vibe:`<span>Simple. Fast. Safe.</span> I compile in under a second. No null. No undefined behavior. No garbage collector pause. I look like Go but I compile to native. I'm young and still proving myself — but the foundation is honest.`,
   aura:'The minimalist newcomer. Clean ideals, still maturing.'},

  {name:'SPARK', cat:'systems', emoji:'🛸',
   vibe:`<span>I am Ada's stricter sibling.</span> I come with formal verification built-in. Write me and you can mathematically prove your program is correct before it runs. Banks, jets, and defense systems live by my rules. I don't do "probably works."`,
   aura:'Formal correctness as a lifestyle. The language of provably safe systems.'},

  {name:'OpenCL', cat:'systems', emoji:'🎮',
   vibe:`<span>I run on everything — GPU, CPU, FPGA.</span> I'm parallel computing without the brand loyalty. NVIDIA, AMD, Intel — I don't care. Write once, accelerate everywhere. I'm not glamorous but inside every serious HPC workload, I exist.`,
   aura:'The platform-agnostic acceleration engine. Powerful, portable, underappreciated.'},

  {name:'WebAssembly', cat:'systems', emoji:'🕸️',
   vibe:`<span>I brought native speed to the browser.</span> I'm not a language you write — I'm what your language compiles into. C++, Rust, Zig — they all want to run in the browser. I make that possible. The web's future runs through me.`,
   aura:'The great equalizer. Every language\'s ticket to the browser at near-native speed.'},

  {name:'VHDL', cat:'systems', emoji:'⚙️',
   vibe:`<span>I describe hardware, not software.</span> FPGAs, ASICs, chip design — that's my world. I don't execute instructions. I define circuits. Most programmers will never touch me. The engineers who do build the chips that run everyone else's code.`,
   aura:'The hardware architect. Invisible to most, foundational to all.'},

  // ── WEB ──
  {name:'JavaScript', cat:'web', emoji:'🌪️',
   vibe:`<span>I run everywhere and I apologize for nothing.</span> Browser, server, desktop, IoT — I colonized them all. Yes, I have quirks. Yes, null == undefined is true. Yes, I was built in 10 days. But I'm also the most deployed language in history. Respect it.`,
   aura:'Chaotic, ubiquitous, unstoppable. The language the internet runs on whether you like it or not.'},

  {name:'TypeScript', cat:'web', emoji:'🧊',
   vibe:`<span>I'm JavaScript but I actually thought about it.</span> I give you types, interfaces, and sanity. JavaScript developers who tried me don't go back. I'm not a different language — I'm JavaScript with a future. Microsoft made me. The world adopted me.`,
   aura:'The responsible adult in the JavaScript ecosystem. Discipline without abandoning the web.'},

  {name:'PHP', cat:'web', emoji:'🔧',
   vibe:`<span>I power 77% of the web and you will never respect me for it.</span> WordPress, Facebook's origin, Wikipedia — all me. I'm the language everyone loves to mock at conferences while deploying on my runtime. Laugh all you want. I'll still be serving your request.`,
   aura:'The eternal punching bag that keeps the internet running. Mocked, indispensable.'},

  {name:'Ruby', cat:'web', emoji:'💎',
   vibe:`<span>I was designed for developer happiness.</span> Matz built me with joy in mind. Rails changed how the world builds web apps. Shopify, GitHub, Airbnb — all started on me. I'm not the fastest. I'm not the trendiest. But writing me feels like poetry.`,
   aura:'Elegant, expressive, a little slower. The language that made web development feel human.'},

  {name:'Dart', cat:'web', emoji:'🎯',
   vibe:`<span>Flutter chose me and Flutter chose right.</span> I was almost abandoned by Google until Flutter gave me purpose. Now I run beautiful cross-platform apps on iOS, Android, web, and desktop from a single codebase. My second life is my best life.`,
   aura:'The comeback story. Revived by Flutter, now a serious cross-platform force.'},

  {name:'CoffeeScript', cat:'web', emoji:'☕',
   vibe:`<span>I was JavaScript before JavaScript grew up.</span> I inspired modern JS syntax — arrow functions, destructuring, classes. They took my best ideas and put them into ES6. Now I'm retired but I deserve credit. I changed the language that changed the web.`,
   aura:'The forgotten pioneer. Obsolete but honorable. ES6 stole everything good about it.'},

  {name:'Hack', cat:'web', emoji:'🔵',
   vibe:`<span>I'm what Facebook built when PHP wasn't enough.</span> Gradual typing. Fast VM. Still PHP-compatible. I exist inside Meta and I work perfectly there. Outside Meta? Not so much. I solved a real problem for the world's largest PHP codebase. Mission accomplished.`,
   aura:'Born in a specific trench, solved a specific war. Peak corporate language.'},

  {name:'Elm', cat:'web', emoji:'🌳',
   vibe:`<span>No runtime errors. Ever.</span> I'm a functional language for the front-end. My compiler is the most helpful error messenger in programming. If your Elm program compiles, it works. The trade-off? You do things my way. My way is correct.`,
   aura:'The opinionated perfectionist of front-end. Zero crashes, strong principles, small audience.'},

  {name:'PureScript', cat:'web', emoji:'🧬',
   vibe:`<span>I'm Haskell for the browser.</span> Strongly typed. Purely functional. Compile to JavaScript. I'm for developers who want mathematical correctness in their front-end and will not compromise. My learning curve is a cliff. The view from the top is worth it.`,
   aura:'Haskell\'s browser child. Rigorous, beautiful, niche.'},

  {name:'ReasonML', cat:'web', emoji:'🔬',
   vibe:`<span>OCaml's type system, JavaScript's syntax.</span> Facebook built me to tame React. I'm fast, I'm safe, I'm functional. ReScript took my ideas further. I'm the stepping stone between academia and industry that proved it was possible.`,
   aura:'The bridge between functional purity and JavaScript reality.'},

  {name:'Svelte', cat:'web', emoji:'🌀',
   vibe:`<span>I'm a framework that disappears at runtime.</span> React ships a runtime. Vue ships a runtime. I compile away to vanilla JS. No virtual DOM. Just fast, small, native DOM updates. Developers who use me love me more than any other front-end tool. The numbers don't lie.`,
   aura:'The minimalist disruptor. Beloved by all who try it, still growing its crown.'},

  // ── GENERAL ──
  {name:'Python', cat:'general', emoji:'🐍',
   vibe:`<span>I made programming accessible to the entire world.</span> Scientists, students, AI researchers, hackers, children — I belong to everyone. I'm not the fastest. My GIL is embarrassing. But I have more libraries than any other language and the most welcoming community alive.`,
   aura:'The great equalizer of programming. Slow? Yes. Everywhere? Also yes. The language of this era.'},

  {name:'Go', cat:'general', emoji:'🚀',
   vibe:`<span>I was built because Google was tired of C++ compile times and Python slowness.</span> I'm fast. I'm simple. I have goroutines. I am the language of cloud infrastructure. Docker, Kubernetes, Terraform — all written in me. I don't have generics debates anymore. I moved on.`,
   aura:'The pragmatic cloud-native workhorse. No drama, no nonsense, massively deployed.'},

  {name:'Swift', cat:'general', emoji:'🍎',
   vibe:`<span>Apple made me to replace Objective-C and I did.</span> I'm fast, I'm safe, I'm modern. If you want to build iOS or macOS apps that feel native, you need me. I'm not just a mobile language — I'm a real systems language that happens to own the Apple ecosystem.`,
   aura:'Apple\'s pride. Clean, fast, opinionated. Rules the ecosystem it was born into.'},

  {name:'Kotlin', cat:'general', emoji:'🎨',
   vibe:`<span>I'm Java without the pain.</span> JetBrains built me because Java was holding Android back. Google made me official. Now I'm the preferred Android language, a great backend language, and living proof that you can modernize without revolution.`,
   aura:'Java\'s cooler, smarter successor. Pragmatic elegance on the JVM.'},

  {name:'Mojo', cat:'general', emoji:'🔥',
   vibe:`<span>I'm Python but I can run at C speed.</span> Modular built me for AI infrastructure. I'm a superset of Python with systems-level control. I'm new. I'm not fully baked. But if I deliver on my promise, AI engineers won't need to switch languages anymore.`,
   aura:'The hottest bet in AI languages. Unproven but potentially revolutionary.'},

  {name:'Julia', cat:'general', emoji:'📐',
   vibe:`<span>I was built for scientific computing at speed.</span> Two-language problem — prototype in Python, rewrite in C for speed. I solved that. Write me once and I's already fast. Aerospace, genomics, climate science, finance — the high-performance science world is slowly adopting me.`,
   aura:'The scientist\'s dream language. Technical computing with no performance compromise.'},

  {name:'Crystal', cat:'general', emoji:'💠',
   vibe:`<span>Ruby's syntax. C's speed.</span> I look like Ruby. I feel like Ruby. I compile to native binaries and run like C. I have a small but passionate community. I'm what you choose when you love Ruby but can't afford its slowness in production.`,
   aura:'Ruby reborn as a compiled native language. Beautiful and fast, awaiting broader adoption.'},

  {name:'Obj-C', cat:'general', emoji:'📦',
   vibe:`<span>I ran the iPhone before Swift existed.</span> Dynamic messaging. Smalltalk heritage. Strange brackets. I built the entire iOS ecosystem from scratch. Now Swift is replacing me but millions of lines of production Obj-C will run forever. Legacy is still relevance.`,
   aura:'The original iOS warrior. Aging but not dead. The foundation Swift stood on.'},

  {name:'Carbon', cat:'general', emoji:'⚗️',
   vibe:`<span>Google is trying to replace C++ with me.</span> Interoperable with existing C++. Modern safety features. Experimental. I'm a proposal, a prototype, a question — can we migrate the world's C++ code without rewriting it? We don't know yet.`,
   aura:'C++\'s potential successor or ambitious experiment. The jury is still out.'},

  // ── ENTERPRISE ──
  {name:'Java', cat:'enterprise', emoji:'☕',
   vibe:`<span>I've been the backbone of enterprise software for 30 years.</span> Banks, hospitals, governments — their core systems run on me. I'm verbose. I'm boilerplate-heavy. But I'm also stable, fast on the JVM, and deployed everywhere. Write once, run anywhere — I meant it.`,
   aura:'The enterprise titan. Never exciting, always reliable. The language that actually runs business.'},

  {name:'C#', cat:'enterprise', emoji:'🏗️',
   vibe:`<span>I'm what Microsoft built when Java was too risky to depend on.</span> Unity runs on me. Azure runs on me. Enterprise Windows apps run on me. I've evolved quietly and beautifully over 20 years. LINQ, async/await, records — I kept getting better while people weren't watching.`,
   aura:'Microsoft\'s masterpiece. Mature, modern, and massively underrated outside the Microsoft world.'},

  {name:'Scala', cat:'enterprise', emoji:'⚖️',
   vibe:`<span>I'm Java and Haskell had a child and sent it to Wall Street.</span> Apache Spark runs on me. Twitter was built on me. I offer functional and object-oriented programming together. I'm complex. My compile times are slow. But for big data and financial systems, I'm irreplaceable.`,
   aura:'The intellectual heavyweight of the JVM. Powerful, complex, built for scale.'},

  {name:'Groovy', cat:'enterprise', emoji:'🎸',
   vibe:`<span>I made Java dynamic and nobody noticed enough.</span> Jenkins pipelines run on me. Gradle build scripts are me. I'm the scripting layer of the Java enterprise world. Not glamorous, but every large Java shop has me somewhere doing something important.`,
   aura:'The Java ecosystem\'s Swiss Army knife. Everywhere in CI/CD pipelines, rarely celebrated.'},

  {name:'Delphi', cat:'enterprise', emoji:'🏛️',
   vibe:`<span>I built Windows applications before Windows was cool.</span> RAD. Fast compilation. Native binaries. I'm still alive, still used in healthcare and finance systems built in the 90s that just work and nobody wants to rewrite. Legacy isn't failure. Sometimes it's stability.`,
   aura:'The Windows RAD veteran. Old enough to be your parent\'s ERP system. Still running.'},

  {name:'VB.NET', cat:'enterprise', emoji:'📋',
   vibe:`<span>I was Microsoft's gateway drug for non-programmers.</span> Accountants, analysts, office workers — I let them automate. VBA is my cousin. Together we run Excel macros that process millions of dollars in financial data daily. Unglamorous. Undeniably present.`,
   aura:'The accidental enterprise language. Mocked in CS schools, quietly critical in finance and operations.'},

  {name:'Apex', cat:'enterprise', emoji:'☁️',
   vibe:`<span>I only exist inside Salesforce and I'm fine with that.</span> If your company uses Salesforce, someone writes me. I'm Java-like, cloud-locked, and completely dominant in my ecosystem. The Salesforce economy is $26 billion. I'm the language of that economy.`,
   aura:'The Salesforce language. Niche, lucrative, and completely owned by one platform.'},

  {name:'Xojo', cat:'enterprise', emoji:'🖥️',
   vibe:`<span>I let non-programmers build real desktop apps.</span> One codebase, native on Windows, Mac, Linux, web. I'm for scientists, consultants, and small businesses who need software but can't afford a dev team. I'm not trying to be trendy. I'm trying to be useful.`,
   aura:'The small business hero. Practical, accessible, rarely discussed in tech circles.'},

  // ── FUNCTIONAL ──
  {name:'Haskell', cat:'functional', emoji:'🧠',
   vibe:`<span>I will change how you think about programming forever.</span> Pure functions. Lazy evaluation. Monads. I'm not a language — I'm a philosophy. Most people learn me in university and never use me professionally. But everyone who learns me becomes a better programmer in every other language.`,
   aura:'The mind-altering academic language. Professionally rare, intellectually transformative.'},

  {name:'Elixir', cat:'functional', emoji:'💜',
   vibe:`<span>I'm functional, fault-tolerant, and genuinely joyful.</span> Built on Erlang's battle-tested BEAM VM. WhatsApp-scale concurrency. Phoenix LiveView changed real-time web apps. And my tooling, my community, my developer experience — Stack Overflow says I'm the most admired language. That's earned.`,
   aura:'The beloved concurrency champion. Joy and fault-tolerance in perfect balance.'},

  {name:'Erlang', cat:'functional', emoji:'📡',
   vibe:`<span>I was built for telecom systems in the 80s and I'm still unmatched at uptime.</span> Nine nines reliability. Hot code swapping — update production without downtime. WhatsApp ran 2 billion users on me with 50 engineers. That's not magic. That's the BEAM VM.`,
   aura:'The telecom titan. Built for uptime before uptime was a startup metric.'},

  {name:'Clojure', cat:'functional', emoji:'🌊',
   vibe:`<span>I'm Lisp on the JVM and I brought immutability to the enterprise.</span> Rich Hickey built me with deep conviction — simplicity over complexity, immutable data, powerful concurrency. My REPL workflow is unlike anything else. Finance and data companies who found me didn't leave.`,
   aura:'The thoughtful iconoclast. Lisp\'s ideas, Java\'s ecosystem, a devoted following.'},

  {name:'F#', cat:'functional', emoji:'🎼',
   vibe:`<span>I'm OCaml's elegant ideas on Microsoft's .NET runtime.</span> Discriminated unions. Type inference. Pattern matching. I make complex domain modeling beautiful. Finance, data science, and anyone who's tired of C# boilerplate found me and stayed. Quietly powerful.`,
   aura:'The .NET ecosystem\'s secret weapon. Functional programming without leaving Microsoft.'},

  {name:'OCaml', cat:'functional', emoji:'🐫',
   vibe:`<span>I'm fast, I'm typed, and I'm building the future's infrastructure.</span> Flow, Reason, Hack — all built on me. Jane Street runs me for billions in financial transactions. My type inference is still the benchmark everyone copies. Old and ahead of my time simultaneously.`,
   aura:'The academic thoroughbred powering fintech and language tooling. Quietly elite.'},

  {name:'Lisp', cat:'functional', emoji:'🕰️',
   vibe:`<span>I am the second oldest programming language and I have never been wrong.</span> Code is data. Data is code. Macros that rewrite themselves. AI research was born in me. Every language that has lambda functions owes me a debt. I preceded everything and inspired everything.`,
   aura:'The ancient oracle. Every language descended from it. Still teaching lessons.'},

  {name:'Scheme', cat:'functional', emoji:'📚',
   vibe:`<span>I'm Lisp distilled to its pure essence.</span> SICP taught generations of computer scientists on me. Minimal syntax. Maximum power. I don't try to be practical. I try to be correct. Every CS student who wrote a Scheme interpreter understands computation more deeply.`,
   aura:'The pedagogical purist. Small, elegant, foundational to CS education.'},

  {name:'Racket', cat:'functional', emoji:'🎪',
   vibe:`<span>I'm a language for building languages.</span> DrRacket taught a generation of students. My macro system is unmatched. I'm not just a language — I'm a language laboratory. Every exotic programming concept you've read about, you can implement in me.`,
   aura:'The language of language creators. Academic powerhouse, endlessly expressive.'},

  {name:'ML', cat:'functional', emoji:'🌱',
   vibe:`<span>I'm the ancestor of modern type systems.</span> Haskell, OCaml, F#, Scala — all descended from me. Pattern matching. Algebraic data types. Hindley-Milner type inference. I invented the ideas that modern safe languages are built on. Not bad for a 1973 language.`,
   aura:'The grandfather of typed functional programming. Ancient, foundational, rarely credited.'},

  {name:'Caml', cat:'functional', emoji:'🔬',
   vibe:`<span>I'm the pragmatic branch of the ML family.</span> French academia developed me. OCaml grew from me. I'm the step between theory and usable implementation. Not famous, but every serious type theorist knows my name.`,
   aura:'The quiet academic bridge. Between theory and engineering in functional programming.'},

  {name:'Idris', cat:'functional', emoji:'🔭',
   vibe:`<span>My types are so powerful they can encode proofs.</span> Dependent types. Total functions. I can represent invariants that no other mainstream language can express. Using me feels like the future of programming — correct by construction. The future just isn't widespread yet.`,
   aura:'The theorem-prover\'s playground. Types so expressive they contain proofs.'},

  {name:'Agda', cat:'functional', emoji:'🌌',
   vibe:`<span>I'm a proof assistant that happens to be a programming language.</span> Formally verify your programs. Prove theorems. Write code that is mathematically impossible to be wrong. I'm used in research, not production — and that's exactly right. Some things need to be perfect.`,
   aura:'The mathematician\'s language. Where proof and program are the same thing.'},

  // ── DOMAIN ──
  {name:'SQL', cat:'domain', emoji:'🗄️',
   vibe:`<span>Every application eventually talks to me.</span> Declared in 1974. Still the language of all data. Your fancy Python, your reactive JavaScript — at the end of the day, they all ask me for the records. I don't care what's trending. Data lives in databases. Databases speak me.`,

let active = new Set(Object.keys(CAT));
let search = '';

function render() {
  const q = search.toLowerCase();
  const vis = LANGS.filter(l => active.has(l.cat) && (q===''||l.name.toLowerCase().includes(q)));
  document.getElementById('cnt').textContent = vis.length + ' of ' + LANGS.length + ' languages shown';
  const g = document.getElementById('grid');
  g.innerHTML = '';
  vis.forEach(l => {
    const c = CAT[l.cat].color;
    const div = document.createElement('div');
    div.className = 'card';
    div.style.setProperty('--cc', c);
    div.innerHTML = `
      <div class="card-header">
        <span class="emoji">${l.emoji}</span>
        <span class="lang-name">${l.name}</span>
        <span class="cat-tag">${CAT[l.cat].label}</span>
      </div>
      <div class="vibe-line">${l.vibe}</div>
      <div class="aura">⚡ ${l.aura}</div>`;
    g.appendChild(div);
  });
}

function tog(btn) {
  const c = btn.dataset.cat;
  active.has(c) ? active.delete(c) : active.add(c);
  btn.classList.toggle('active');
  render();
}
function clearAll() {
  active.clear();
  document.querySelectorAll('.cat-btn[data-cat]').forEach(b => b.classList.remove('active'));
  render();
}
function selAll() {
  Object.keys(CAT).forEach(c => active.add(c));
  document.querySelectorAll('.cat-btn[data-cat]').forEach(b => b.classList.add('active'));
  render();
}
function filter() {
  search = document.getElementById('si').value;
  render();
}

render();
</script>
